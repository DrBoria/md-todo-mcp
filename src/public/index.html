<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo MCP App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        textarea {
            min-height: 80px;
            resize: vertical;
        }
        button {
            background: #007acc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #0062a3;
        }
        .todo-list {
            margin-top: 20px;
        }
        .todo-item {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .todo-title {
            font-weight: 600;
            margin-bottom: 5px;
        }
        .todo-meta {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }
        .todo-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-edit {
            background: #28a745;
        }
        .btn-delete {
            background: #dc3545;
        }
        .btn-approve {
            background: #17a2b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todo Management</h1>
        
        <!-- Create Todo Form -->
        <div id="create-form">
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" placeholder="Enter task title">
            </div>
            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" placeholder="Enter task description"></textarea>
            </div>
            <div class="form-group">
                <label for="assignedTo">Assign to:</label>
                <select id="assignedTo">
                    <!-- Will be populated from MCP context -->
                </select>
            </div>
            <div class="form-group">
                <label for="priority">Priority:</label>
                <select id="priority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <button onclick="createTodo()">Create Todo</button>
        </div>

        <!-- Todo List -->
        <div class="todo-list" id="todo-list">
            <!-- Todos will be populated here -->
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
